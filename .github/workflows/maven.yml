name: API Automation CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: maven

      - name: Run Rest Assured Tests
        run: mvn clean test -U
        continue-on-error: true

      # ✅ تحقق إن allure-results اتولدت
      - name: Check allure-results
        if: always()
        run: |
          echo "=== target/allure-results ==="
          ls -la target/allure-results || echo "FOLDER NOT FOUND"

      # ✅ تثبيت Allure CLI
      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ✅ جلب التاريخ القديم
      - name: Get Allure history
        if: always()
        run: |
          git clone --single-branch --branch gh-pages \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages || mkdir -p gh-pages
          mkdir -p gh-pages

      # ✅ توليد التقرير يدوياً
      - name: Generate Allure Report
        if: always()
        run: |
          cp -r gh-pages/history target/allure-results/history || true
          allure generate target/allure-results --clean -o allure-report
          echo "=== allure-report folder ==="
          ls -la allure-report

      # ✅ نسخ التاريخ للـ report
      - name: Copy history for next run
        if: always()
        run: |
          cp -r allure-report/history gh-pages/history || true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: .
