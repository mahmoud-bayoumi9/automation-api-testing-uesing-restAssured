name: API Automation CI/CD Pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: maven

      - name: Run Rest Assured Tests
        run: mvn clean test -U
        continue-on-error: true

      - name: Debug - Check allure-results content
        if: always()
        run: |
          echo "=== target folder ==="
          ls -la target/ || echo "target NOT FOUND"
          echo "=== allure-results ==="
          ls -la target/allure-results/ || echo "allure-results NOT FOUND or EMPTY"
          echo "=== surefire-reports ==="
          ls -la target/surefire-reports/ || echo "surefire-reports NOT FOUND"

      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Get Allure history
        if: always()
        run: |
          git clone --single-branch --branch gh-pages \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages || mkdir -p gh-pages
          mkdir -p gh-pages

