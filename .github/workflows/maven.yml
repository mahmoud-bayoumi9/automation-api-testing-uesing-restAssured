name: API Automation CI/CD Pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: maven

      # تشغيل التيستات (حتى لو فشلت، الـ Pipeline هيكمل للخطوة اللي بعدها)
      - name: Run Rest Assured Tests
        run: mvn clean test
        continue-on-error: true

      # 🎯 جلب التاريخ القديم للمسار الموحد الصحيح (allure-history)
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history

      # 🔥 توليد التقرير ودمج الـ History أوتوماتيك من الفولدر الصح
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      # 🚀 رفع التقرير النهائي على GitHub Pages من الفولدر المدمج
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
