name: API Automation CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: maven

      - name: Run Rest Assured Tests
        run: mvn clean test -U
        continue-on-error: true

      - name: Get Allure history
        if: always()
        run: |
          git clone --single-branch --branch gh-pages \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages || mkdir -p gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: target/allure-results
          allure_history: gh-pages
          keep_reports: 20

      # ✅ شوف المجلدات اللي اتولدت
      - name: Debug - List generated folders
        if: always()
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== allure-history folder ==="
          ls -la allure-history || echo "NOT FOUND"
          echo "=== gh-pages folder ==="
          ls -la gh-pages || echo "NOT FOUND"

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
